name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          set -euo pipefail
          SLUG="wordpress-ai-connector"
          STAGE="build/${SLUG}"
          mkdir -p "${STAGE}"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='build' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='phpunit.xml*' \
            --exclude='composer.lock' \
            ./ "${STAGE}/"
          (cd build && zip -rq "../${SLUG}.zip" "${SLUG}")
          ls -lh "${SLUG}.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            wordpress-ai-connector.zip \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
